<svg width="1200" height="480" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="480" fill="#f8f6f3"/>

  <!-- Center: Training program laptop -->
  <rect x="370" y="50" width="460" height="300" rx="16" fill="#2d2d2d"/>
  <rect x="384" y="64" width="432" height="272" rx="8" fill="white"/>
  <!-- Laptop base -->
  <path d="M330 350 L370 350 L370 360 Q370 370 380 370 L820 370 Q830 370 830 360 L830 350 L870 350 Q880 350 878 360 L860 380 Q856 386 848 386 L352 386 Q344 386 340 380 L322 360 Q320 350 330 350Z" fill="#e0e0e0"/>

  <!-- Header bar -->
  <rect x="384" y="64" width="432" height="36" rx="8" fill="#6b9e9e" opacity="0.9"/>
  <text x="600" y="87" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="bold" fill="white">IT・AI 研修プログラム</text>

  <!-- 3-month timeline -->
  <rect x="408" y="116" width="398" height="40" rx="8" fill="#f5f0eb"/>
