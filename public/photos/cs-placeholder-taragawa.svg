  <circle cx="90" cy="168" r="14" fill="#6b9e9e" opacity="0.2"/>
  <text x="90" y="172" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b9e9e">A</text>
  <rect x="114" y="160" width="60" height="8" rx="3" fill="#f0ece6"/>
  <rect x="114" y="174" width="80" height="6" rx="3" fill="#0F9D58" opacity="0.3"/>

  <circle cx="90" cy="210" r="14" fill="#eaad63" opacity="0.2"/>
  <text x="90" y="214" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#eaad63">B</text>
  <rect x="114" y="202" width="70" height="8" rx="3" fill="#f0ece6"/>
  <rect x="114" y="216" width="90" height="6" rx="3" fill="#0F9D58" opacity="0.3"/>

  <circle cx="90" cy="252" r="14" fill="#6b9e9e" opacity="0.2"/>
  <text x="90" y="256" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6b9e9e">C</text>
  <rect x="114" y="244" width="55" height="8" rx="3" fill="#f0ece6"/>
  <rect x="114" y="258" width="70" height="6" rx="3" fill="#0F9D58" opacity="0.3"/>

  <circle cx="90" cy="294" r="14" fill="#eaad63" opacity="0.2"/>
  <text x="90" y="298" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#eaad63">D</text>
  <rect x="114" y="286" width="65" height="8" rx="3" fill="#f0ece6"/>
  <rect x="114" y="300" width="100" height="6" rx="3" fill="#0F9D58" opacity="0.3"/>

  <!-- Connection line team → laptop -->
  <path d="M240 230 L370 230" stroke="#6b9e9e" stroke-width="1.5" stroke-dasharray="6 3" fill="none" opacity="0.35"/>

  <!-- Results (right) -->
  <rect x="960" y="100" width="180" height="260" rx="14" fill="white" stroke="#ddd" stroke-width="2"/>
  <rect x="960" y="100" width="180" height="30" rx="14" fill="#eaad63" opacity="0.15"/>
  <text x="1050" y="120" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#eaad63">研修成果</text>

  <!-- Before/After metrics -->
  <text x="1050" y="158" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999">IT活用スキル</text>
  <rect x="985" y="166" width="130" height="16" rx="4" fill="#f0ece6"/>
  <rect x="985" y="166" width="40" height="16" rx="4" fill="#ddd"/>
  <text x="1000" y="178" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#999">前</text>
  <rect x="985" y="188" width="130" height="16" rx="4" fill="#f0ece6"/>
  <rect x="985" y="188" width="110" height="16" rx="4" fill="#6b9e9e" opacity="0.6"/>
  <text x="1035" y="200" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">後</text>

  <text x="1050" y="228" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999">業務効率</text>
  <rect x="985" y="236" width="130" height="16" rx="4" fill="#f0ece6"/>
  <rect x="985" y="236" width="50" height="16" rx="4" fill="#ddd"/>
  <text x="1005" y="248" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#999">前</text>
  <rect x="985" y="258" width="130" height="16" rx="4" fill="#f0ece6"/>
  <rect x="985" y="258" width="120" height="16" rx="4" fill="#eaad63" opacity="0.6"/>
  <text x="1040" y="270" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">後</text>

  <!-- Up arrow indicator -->
  <text x="1050" y="310" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#6b9e9e">↑</text>
  <text x="1050" y="334" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6b9e9e">スキル向上</text>

  <!-- Connection line laptop → results -->
  <path d="M830 230 L960 230" stroke="#eaad63" stroke-width="1.5" stroke-dasharray="6 3" fill="none" opacity="0.35"/>
</svg>
