  <rect x="420" y="124" width="110" height="24" rx="6" fill="#eaad63" opacity="0.3"/>
  <text x="475" y="140" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#eaad63">1ヶ月目</text>
  <rect x="542" y="124" width="110" height="24" rx="6" fill="#eaad63" opacity="0.5"/>
  <text x="597" y="140" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#eaad63">2ヶ月目</text>
  <rect x="664" y="124" width="130" height="24" rx="6" fill="#eaad63" opacity="0.8"/>
  <text x="729" y="140" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#c8891e">3ヶ月目</text>

  <!-- Training modules -->
  <!-- Module 1: IT basics -->
  <rect x="408" y="170" width="126" height="72" rx="8" fill="#4285F4" opacity="0.1"/>
  <rect x="424" y="182" width="24" height="24" rx="5" fill="#4285F4" opacity="0.4"/>
  <text x="436" y="198" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">💻</text>
  <text x="460" y="196" font-family="sans-serif" font-size="11" font-weight="bold" fill="#4285F4">IT基礎</text>
  <text x="420" y="224" font-family="sans-serif" font-size="9" fill="#999">クラウド・セキュリティ</text>

  <!-- Module 2: AI tools -->
  <rect x="546" y="170" width="126" height="72" rx="8" fill="#0F9D58" opacity="0.1"/>
  <rect x="562" y="182" width="24" height="24" rx="5" fill="#0F9D58" opacity="0.4"/>
  <text x="574" y="198" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">🤖</text>
  <text x="598" y="196" font-family="sans-serif" font-size="11" font-weight="bold" fill="#0F9D58">AI活用</text>
  <text x="558" y="224" font-family="sans-serif" font-size="9" fill="#999">ChatGPT・自動化</text>

  <!-- Module 3: Sales DX -->
  <rect x="684" y="170" width="126" height="72" rx="8" fill="#eaad63" opacity="0.15"/>
  <rect x="700" y="182" width="24" height="24" rx="5" fill="#eaad63" opacity="0.5"/>
  <text x="712" y="198" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">📊</text>
  <text x="736" y="196" font-family="sans-serif" font-size="11" font-weight="bold" fill="#c8891e">営業DX</text>
