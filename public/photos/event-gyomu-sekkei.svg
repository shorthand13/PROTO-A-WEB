  <line x1="468" y1="220" x2="580" y2="230" stroke="#6b9e9e" stroke-width="1.5" opacity="0.2"/>
  <circle cx="595" cy="232" r="36" fill="white" stroke="#6b9e9e" stroke-width="2"/>
  <polyline points="575,252 585,242 595,248 605,228 615,222" fill="none" stroke="#6b9e9e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
  <circle cx="615" cy="222" r="3" fill="#eaad63"/>

  <!-- Node 4: Structure/Blocks (bottom-right) -->
  <line x1="440" y1="265" x2="510" y2="340" stroke="#eaad63" stroke-width="1.5" opacity="0.2"/>
  <circle cx="520" cy="350" r="36" fill="white" stroke="#eaad63" stroke-width="2"/>
  <rect x="504" y="334" width="14" height="14" rx="2" fill="#6b9e9e" opacity="0.2" stroke="#6b9e9e" stroke-width="1"/>
  <rect x="522" y="334" width="14" height="14" rx="2" fill="#eaad63" opacity="0.2" stroke="#eaad63" stroke-width="1"/>
  <rect x="504" y="352" width="14" height="14" rx="2" fill="#eaad63" opacity="0.2" stroke="#eaad63" stroke-width="1"/>
  <rect x="522" y="352" width="14" height="14" rx="2" fill="#6b9e9e" opacity="0.2" stroke="#6b9e9e" stroke-width="1"/>

  <!-- Node 5: Workflow/Arrows (bottom-left) -->
  <line x1="355" y1="265" x2="280" y2="335" stroke="#6b9e9e" stroke-width="1.5" opacity="0.2"/>
  <circle cx="270" cy="345" r="36" fill="white" stroke="#6b9e9e" stroke-width="2"/>
  <path d="M252 340 L268 340 L268 332 L284 345 L268 358 L268 350 L252 350 Z" fill="#6b9e9e" opacity="0.2" stroke="#6b9e9e" stroke-width="1.2"/>

