  <line x1="332" y1="220" x2="210" y2="230" stroke="#eaad63" stroke-width="1.5" opacity="0.2"/>
  <circle cx="195" cy="232" r="36" fill="white" stroke="#eaad63" stroke-width="2"/>
  <circle cx="195" cy="225" r="12" fill="none" stroke="#eaad63" stroke-width="1.8" opacity="0.4"/>
  <line x1="190" y1="240" x2="200" y2="240" stroke="#eaad63" stroke-width="1.8" opacity="0.3" stroke-linecap="round"/>
  <line x1="191" y1="245" x2="199" y2="245" stroke="#eaad63" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <line x1="195" y1="210" x2="195" y2="205" stroke="#eaad63" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>
  <line x1="182" y1="215" x2="178" y2="211" stroke="#eaad63" stroke-width="1.2" opacity="0.25" stroke-linecap="round"/>
  <line x1="208" y1="215" x2="212" y2="211" stroke="#eaad63" stroke-width="1.2" opacity="0.25" stroke-linecap="round"/>

  <!-- Dashed orbit ring -->
  <circle cx="400" cy="210" r="170" fill="none" stroke="#6b9e9e" stroke-width="1" stroke-dasharray="6 8" opacity="0.1"/>

  <!-- Small floating dots for dynamism -->
  <circle cx="320" cy="130" r="3" fill="#eaad63" opacity="0.3"/>
  <circle cx="490" cy="140" r="2.5" fill="#6b9e9e" opacity="0.25"/>
  <circle cx="310" cy="290" r="2" fill="#6b9e9e" opacity="0.2"/>
  <circle cx="500" cy="280" r="3" fill="#eaad63" opacity="0.25"/>
  <circle cx="140" cy="170" r="2.5" fill="#6b9e9e" opacity="0.15"/>
  <circle cx="660" cy="160" r="2" fill="#eaad63" opacity="0.2"/>
  <circle cx="130" cy="300" r="3" fill="#eaad63" opacity="0.12"/>
  <circle cx="680" cy="300" r="2.5" fill="#6b9e9e" opacity="0.15"/>

  <!-- Top & bottom accent lines -->
  <rect width="800" height="4" rx="2" fill="#6b9e9e"/>
  <rect y="416" width="800" height="4" rx="2" fill="#eaad63"/>
