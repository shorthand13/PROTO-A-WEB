<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <!-- Background with warm gradient feel -->
  <rect width="800" height="420" rx="16" fill="#f8f6f3"/>

  <!-- Large abstract shapes - layered composition -->
  <!-- Bottom-right large teal blob -->
  <ellipse cx="620" cy="320" rx="220" ry="180" fill="#6b9e9e" opacity="0.07"/>
  <!-- Top-left gold blob -->
  <ellipse cx="180" cy="100" rx="200" ry="150" fill="#eaad63" opacity="0.06"/>

  <!-- Central composition: interconnected business system -->
  <!-- Main hub circle -->
  <circle cx="400" cy="210" r="70" fill="white" stroke="#6b9e9e" stroke-width="2.5"/>
  <circle cx="400" cy="210" r="55" fill="#6b9e9e" opacity="0.06"/>

  <!-- Inner hub: abstract book/document -->
  <rect x="375" y="182" width="50" height="56" rx="4" fill="white" stroke="#6b9e9e" stroke-width="1.8"/>
  <rect x="375" y="182" width="8" height="56" rx="3" fill="#6b9e9e" opacity="0.25"/>
  <rect x="390" y="194" width="28" height="3" rx="1.5" fill="#6b9e9e" opacity="0.35"/>
  <rect x="390" y="202" width="22" height="3" rx="1.5" fill="#eaad63" opacity="0.5"/>
  <rect x="390" y="210" width="26" height="3" rx="1.5" fill="#6b9e9e" opacity="0.25"/>
  <rect x="390" y="218" width="18" height="3" rx="1.5" fill="#6b9e9e" opacity="0.2"/>
  <rect x="390" y="226" width="24" height="3" rx="1.5" fill="#eaad63" opacity="0.35"/>

  <!-- Orbiting satellite nodes with connecting lines -->

  <!-- Node 1: People/Team (top-left) -->
  <line x1="348" y1="163" x2="240" y2="100" stroke="#6b9e9e" stroke-width="1.5" opacity="0.2"/>
  <circle cx="230" cy="92" r="36" fill="white" stroke="#6b9e9e" stroke-width="2"/>
  <circle cx="230" cy="82" r="10" fill="#6b9e9e" opacity="0.2"/>
  <path d="M215 102 Q230 95 245 102" stroke="#6b9e9e" stroke-width="1.5" fill="#6b9e9e" opacity="0.15"/>
  <circle cx="213" cy="86" r="6" fill="#eaad63" opacity="0.2"/>
  <circle cx="247" cy="86" r="6" fill="#eaad63" opacity="0.2"/>

  <!-- Node 2: Process/Gears (top-right) -->
  <line x1="452" y1="163" x2="560" y2="95" stroke="#eaad63" stroke-width="1.5" opacity="0.2"/>
  <circle cx="570" cy="88" r="36" fill="white" stroke="#eaad63" stroke-width="2"/>
  <circle cx="562" cy="82" r="14" fill="none" stroke="#eaad63" stroke-width="1.8" opacity="0.4"/>
  <circle cx="562" cy="82" r="5" fill="#eaad63" opacity="0.25"/>
  <circle cx="580" cy="96" r="10" fill="none" stroke="#eaad63" stroke-width="1.8" opacity="0.3"/>
  <circle cx="580" cy="96" r="3.5" fill="#eaad63" opacity="0.2"/>

